version: 1
paths:
  configDir: "/workspace/config"
  outputDir: "/data/output"
  tempDir: "/tmp/scanit"
  dbFile: "/data/db/scanit.sqlite"

integrations:
  homeassistant:
    enabled: true
    mqtt:
      brokerUrl: "mqtt://10.0.50.10:1883"
      username: "${MQTT_USER}"
      password: "${MQTT_PASS}"
      # clientId: "scanit"          # defaults to "scanit"
      # topicPrefix: "scanit"       # defaults to "scanit"
    discovery:
      prefix: "homeassistant"       # HA discovery topic prefix
      deviceName: "ScanIt"          # shown in HA device registry
      deviceId: "scanit"            # unique device identifier
    buttons:
      # Each button becomes an HA button entity + status sensor.
      # Only presetId is required; profileId and scannerId fall
      # back to config defaults if omitted.
      - id: "scan_noah"
        label: "Scan Noah"
        presetId: "user_f5a00514"
      - id: "scan_noah_flat"
        label: "Scan Noah Flatbed"
        presetId: "user_a83b7705"
  paperless:
    - id: noah
      label: "Noah's Paperless"
      baseUrl: "https://paper.home"
      token: "${PAPERLESS_TOKEN_NOAH}"
      timeoutMs: 30000
      verifyTls: false