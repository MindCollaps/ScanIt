# ──────────────────────────────────────────────────────────────
# ScanIt User Configuration
#
# Add your own scanners, profiles, presets, workflows here.
# This file is merged ON TOP of the system defaults (00-system.yaml).
# Arrays (scanners, profiles, presets, etc.) are merged by "id":
#   - Same id → your values override the default
#   - New id  → added to the list
#
# See examples/ for full configuration references.
# ──────────────────────────────────────────────────────────────
version: 1

# ── Scanners ─────────────────────────────────────────────────
# scanners:
#   - id: "office_adf"
#     label: "Office ADF"
#     enabled: true
#     backend: "sane"
#     connection:
#       mode: "network"
#       device: "escl:http://192.168.1.50"
#       discover: true
#     capabilities:
#       adf: true
#       flatbed: true
#       duplex: true
#     defaults:
#       source: "ADF Duplex"
