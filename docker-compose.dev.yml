services:
  scanit-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /workspace
    network_mode: host
    environment:
      SCANIT_CONFIG_DIR: /workspace/config
    env_file:
      - .env
    volumes:
      - ./:/workspace
      - dev_node_modules:/workspace/node_modules
      - ./.data/output:/data/output
      - ./.data/db:/data/db
      - dev_sane_config:/etc/sane.d
      - /var/run/dbus:/var/run/dbus
      - /run/avahi-daemon/socket:/run/avahi-daemon/socket
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8863/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  dev_node_modules:
  dev_sane_config:
