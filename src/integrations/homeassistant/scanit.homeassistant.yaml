# ──────────────────────────────────────────────────────────────
# ScanIt — Home Assistant MQTT Integration Example
# Copy this to config/ alongside 00-system.yaml to enable HA.
#
# See README.md in this directory for full documentation on
# MQTT topics, scan modes, and HA entities.
#
# Modes cycle as: default -> double_sided -> endless -> default
# - default: scan dispatches to consumers immediately on completion
# - double_sided/endless: scan creates/extends a held job (no dispatch yet)
#   Finalize by pressing the Finalize Held Scan button (or mode-cycle button).
#
# Requirements:
#   - An MQTT broker (e.g. Mosquitto add-on in HA)
#   - HA MQTT integration configured and connected to the same broker
# ──────────────────────────────────────────────────────────────
version: 1

integrations:
  homeassistant:
    enabled: true
    mqtt:
      brokerUrl: "mqtt://localhost:1883"
      username: "${MQTT_USER}"
      password: "${MQTT_PASS}"
      # clientId: "scanit"          # defaults to "scanit"
      # topicPrefix: "scanit"       # defaults to "scanit"
    discovery:
      prefix: "homeassistant"       # HA discovery topic prefix
      deviceName: "ScanIt"          # shown in HA device registry
      deviceId: "scanit"            # unique device identifier
    buttons:
      # Each entry becomes an HA scan trigger button.
      # Status/messages are exposed globally (not per-button) and include current job info.
      # Only presetId is required; profileId and scannerId fall
      # back to config defaults if omitted.
      - id: "scan_mrx"
        label: "Scan MRX"
        presetId: "doc_300_color"
        # scannerId: "office_adf"   # optional — falls back to first enabled scanner

      - id: "scan_quick_gray"
        label: "Quick Grayscale Scan"
        presetId: "doc_300_gray"
        consumerOverride:            # optional — overrides preset consumers
          - "filesystem"
          - "paperless:main"
